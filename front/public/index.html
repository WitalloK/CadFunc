<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Gestão de Funcionários</h1>
        </header>

        <section class="form-section">
            <h2>Cadastrar / Atualizar Funcionário</h2>
            <form id="funcionarioForm">
                <input type="hidden" id="id">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="cargo" placeholder="Cargo" required>
                <input type="number" id="salario" placeholder="Salário" required>
                <button type="submit">Salvar</button>
            </form>
        </section>

        <section>
            <h2>Lista de Funcionários</h2>
            <table>
                <thead> 
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Salário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="funcionarioTable"></tbody>
            </table>
        </section>

        <footer>
            <p>Sistema de Gestão de Funcionários</p>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
